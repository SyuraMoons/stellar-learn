name: Deploy contract to testnet

on:
  workflow_dispatch:
    inputs:
      contract:
        description: Which contract to deploy
        required: true
        type: choice
        options:
          - router
          - escrow
        default: router

env:
  STELLAR_CLI_VERSION: 27.0.0

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.contract }} to testnet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: soroban-hello-world

      - name: Install stellar CLI (release tarball)
        run: |
          curl -sL "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz
          sudo mv stellar /usr/local/bin/stellar
          stellar --version

      - name: Recreate deployer identity from CI secret
        run: |
          stellar keys add deployer --overwrite --secret-key <<< "${{ secrets.STELLAR_DEPLOYER_SECRET_KEY }}"
          stellar keys address deployer

      - name: Deploy router
        if: github.event.inputs.contract == 'router'
        working-directory: soroban-hello-world
        env:
          ESCROW_CONTRACT_ID: ${{ vars.ESCROW_CONTRACT_ID }}
        run: |
          ./scripts/deploy-router.sh | tee deploy-output.txt
          {
            echo "## Router deployment"
            echo '```'
            cat deploy-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy escrow
        if: github.event.inputs.contract == 'escrow'
        working-directory: soroban-hello-world
        run: |
          ./scripts/deploy-testnet.sh | tee deploy-output.txt
          {
            echo "## Escrow deployment"
            echo '```'
            cat deploy-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
